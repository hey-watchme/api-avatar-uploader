name: Deploy to Amazon ECR and EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: watchme-api-avatar-uploader
  EC2_APP_DIR: /home/ubuntu/watchme-avatar-uploader

jobs:
  deploy:
    name: Build and Push to ECR
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Delete old images from ECR
      run: |
        aws ecr batch-delete-image \
          --region ${{ env.AWS_REGION }} \
          --repository-name ${{ env.ECR_REPOSITORY }} \
          --image-ids imageTag=latest || true

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker buildx build \
          --platform linux/arm64 \
          --no-cache \
          --push \
          -f Dockerfile.prod \
          -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG \
          -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest \
          .

        echo "Image pushed to ECR:"
        echo "  - $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG"
        echo "  - $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest"

  deploy-to-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: deploy

    steps:
    - name: Setup SSH Agent
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Add EC2 to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Create application directory on EC2
      env:
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USER: ${{ secrets.EC2_USER }}
      run: |
        ssh ${EC2_USER}@${EC2_HOST} "mkdir -p ${{ env.EC2_APP_DIR }}"

    - name: Update configuration files on EC2
      env:
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USER: ${{ secrets.EC2_USER }}
      run: |
        scp -o StrictHostKeyChecking=no docker-compose.prod.yml ${EC2_USER}@${EC2_HOST}:${{ env.EC2_APP_DIR }}/
        scp -o StrictHostKeyChecking=no run-prod.sh ${EC2_USER}@${EC2_HOST}:${{ env.EC2_APP_DIR }}/
        ssh ${EC2_USER}@${EC2_HOST} "chmod +x ${{ env.EC2_APP_DIR }}/run-prod.sh"

    - name: Create .env file on EC2
      env:
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USER: ${{ secrets.EC2_USER }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
      run: |
        ssh ${EC2_USER}@${EC2_HOST} << ENDSSH
          cd ${{ env.EC2_APP_DIR }}
          echo "SUPABASE_URL=${SUPABASE_URL}" > .env
          echo "SUPABASE_KEY=${SUPABASE_KEY}" >> .env
          echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}" >> .env
          echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}" >> .env
          echo "S3_BUCKET_NAME=${S3_BUCKET_NAME}" >> .env
          echo "AWS_REGION=ap-southeast-2" >> .env
          echo "API_PORT=8014" >> .env
          echo "API_HOST=0.0.0.0" >> .env
        ENDSSH

    - name: Deploy to EC2
      env:
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USER: ${{ secrets.EC2_USER }}
      run: |
        ssh ${EC2_USER}@${EC2_HOST} << 'ENDSSH'
          set -e
          cd /home/ubuntu/watchme-avatar-uploader

          # Stop and remove existing container (handle both compose and standalone)
          docker stop watchme-avatar-uploader 2>/dev/null || true
          docker rm watchme-avatar-uploader 2>/dev/null || true
          docker-compose -f docker-compose.prod.yml down 2>/dev/null || true

          # Run deployment
          ./run-prod.sh

          # Verify container is running
          if docker ps | grep watchme-avatar-uploader; then
            echo "Container started successfully"
          else
            echo "Container failed to start"
            docker logs watchme-avatar-uploader --tail 50
            exit 1
          fi

          # Health check (max 60s)
          for i in {1..12}; do
            if curl -f http://localhost:8014/health > /dev/null 2>&1; then
              echo "Health check passed (attempt $i/12)"
              break
            fi
            echo "Attempt $i/12 failed, retrying in 5 seconds..."
            sleep 5
          done
        ENDSSH

    - name: Deployment Success
      if: success()
      run: |
        echo "CI/CD pipeline completed successfully"
        echo "Service: watchme-avatar-uploader"
        echo "URL: https://api.hey-watch.me/avatar/"
        echo "Version: ${{ github.sha }}"

    - name: Deployment Failure
      if: failure()
      run: |
        echo "EC2 deployment failed. Check logs above."
