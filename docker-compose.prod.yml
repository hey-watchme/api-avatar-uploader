services:
  avatar-uploader:
    image: 754724220380.dkr.ecr.ap-southeast-2.amazonaws.com/watchme-api-avatar-uploader:latest
    container_name: watchme-avatar-uploader
    ports:
      - "127.0.0.1:8014:8014"
    env_file:
      - .env
    restart: always
    networks:
      - watchme-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8014/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  watchme-network:
    external: true
